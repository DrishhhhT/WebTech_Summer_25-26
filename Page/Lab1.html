<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title> SignUp </title>
        <link rel="stylesheet" href="../Design/style.css">
    </head>
    <body>
        
         <h1> User Registration Form </h1>
         <div class = "container">
    
            <form>
             <fieldset>
             <legend>Personal Information </legend>
            <table>
                <tr> 
                    <td><label for ="fname"> First Name : </label></td>
                    <td><input type ="text" id ="fname" name="fname" placeholder="Enter Your First Name"></td>
                </tr>
                <tr> 
                    <td><label for ="lname"> First Name : </label></td>
                    <td><input type ="text" id ="lname" name="lname" placeholder="Enter Your Last Name"></td>
                </tr>
                <tr>
                    <td><label for ="DOB"> DOB : </label> </td>
                    <td><input type ="date" id ="DOB" name="DOB"></td>
                </tr>
                     
                </table>

                    <label for ="Gender"> Gender : </label> 
                    <input type ="radio" id ="DOB" name="DOB" value="Male">Male
                    <input type ="radio" id ="DOB" name="DOB" value="Female">Female
                    <input type ="radio" id ="DOB" name="DOB" value="Others">Others

                </fieldset>

                <fieldset>
                    <legend> Contact Information </legend>
                    <table>
                       <tr> 
                        <td><label for ="email"> E-mail Address : </label></td>
                        <td><input type ="email" id ="email" name="email"></td>
                       </tr> 
                       <tr> 
                        <td><label for ="phone"> Phone Number : </label></td>
                        <td><input type ="text" id ="phone" name="phone"></td>
                       </tr>
                       <tr> 
                        <td><label for ="address"> Address : </label></td>
                        <td><textarea id ="address" name="address" placeholder="Enter Your Full Address"></textarea></td>
                       </tr>

                    </table>
                </fieldset>

                <fieldset>
                    <legend> Account Information </legend>
                    <table>
                     <tr>
                        <td><label for="uname"> Username* </label></td>
                        <td><input type="text" id="uname" name="uname"></td>
                     </tr>
                     <tr>
                        <td><label for="password"> Password* </label></td>
                        <td><input type="password" id="password" name="password"></td>
                     </tr>

                      <tr>
                        <td><label for="password"> Confirm Password* </label></td>
                        <td><input type="password" id="password" name="password"></td>
                     </tr>
                     
                    </table>
                </fieldset>
                <fieldset>
                    <legend> Account Information </legend>
                    <table>
                        <tr>
                            <td><label for="interest"> Interest : </label></td> 
                            <td><input type="checkbox" id="interest" name="interest" value="Sports">Sports</td>
                            <td><input type="checkbox" id="interest" name="interest" value="Music">Music</td>
                            <td><input type="checkbox" id="interest" name="interest" value="Reading">Reading</td>
                            <td><input type="checkbox" id="interest" name="interest" value="Technology">Technology</td>
                        </tr>

                        <tr>
                            <td><input type="checkbox" id="T&C" name="T&C" value="T&C"> I agree to the Terms and Conditions* </td>
                        </tr>

                    </table>
                </fieldset>

                
                <input type="submit" value="Register">
                <input type="reset" value="Clear">

        </form>
    </div> 
    </body>
</html
